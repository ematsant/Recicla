<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Imagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        button {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        #startBtn:active {
            transform: translateY(0);
        }

        #stopBtn {
            background: #ff6b6b;
            color: white;
            display: none;
        }

        #stopBtn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        #webcam-container {
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        #webcam-container.active {
            display: block;
        }

        #webcam-container canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        #label-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .prediction-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .prediction-item:hover {
            background: #f0f1ff;
            transform: translateX(5px);
        }

        .prediction-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .prediction-bar {
            background: #e9ecef;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .prediction-progress {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .loading {
            text-align: center;
            color: #666;
            display: none;
            font-size: 14px;
        }

        .loading.active {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                border-radius: 15px;
            }

            h1 {
                font-size: 24px;
            }

            button {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Classificador de Imagens</h1>
        <p class="subtitle">Seu modelo de IA em tempo real</p>
        
        <div class="button-container">
            <button type="button" id="startBtn" onclick="init()">▶ Iniciar</button>
            <button type="button" id="stopBtn" onclick="stop()">⏹ Parar</button>
        </div>

        <div class="loading" id="loading">Carregando modelo...</div>
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
        // Configuração da API
        const URL = "./my_model/";
        
        // Variáveis globais
        let model, webcam, labelContainer, maxPredictions;
        let animationFrameId = null;
        let isRunning = false;
        let currentStream = null;

        // Carregar o modelo e configurar a webcam
        async function init() {
            try {
                const loading = document.getElementById("loading");
                loading.classList.add("active");

                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                // Carregar o modelo e metadados
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // Detectar dispositivo móvel
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const flip = !isMobile;
                
                // Criar webcam
                webcam = new tmImage.Webcam(400, 400, flip);
                
                // Configurar acesso à câmera
                if (isMobile) {
                    // Para mobile, usar getUserMedia com câmera traseira
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                facingMode: { ideal: "environment" },
                                width: { ideal: 400 },
                                height: { ideal: 400 }
                            },
                            audio: false
                        });
                        currentStream = stream;
                        // Usar o stream obtido para configurar a webcam
                        webcam.canvas.getContext("2d").canvas.style.display = "none";
                        const video = document.createElement("video");
                        video.srcObject = stream;
                        video.play();
                        
                        // Substituir o método update para usar nosso vídeo
                        const ctx = webcam.canvas.getContext("2d");
                        webcam.update = function() {
                            ctx.drawImage(video, 0, 0, 400, 400);
                        };
                        
                        isRunning = true;
                    } catch (err) {
                        console.warn("Não foi possível usar câmera traseira, usando padrão:", err);
                        // Fallback para câmera padrão
                        await webcam.setup();
                        await webcam.play();
                        isRunning = true;
                    }
                } else {
                    // Para desktop
                    await webcam.setup();
                    await webcam.play();
                    isRunning = true;
                }

                // Atualizar UI
                loading.classList.remove("active");
                document.getElementById("startBtn").style.display = "none";
                document.getElementById("stopBtn").style.display = "inline-block";
                document.getElementById("webcam-container").classList.add("active");

                // Adicionar canvas à página
                const container = document.getElementById("webcam-container");
                container.innerHTML = "";
                container.appendChild(webcam.canvas);

                // Criar elementos para labels
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                
                for (let i = 0; i < maxPredictions; i++) {
                    const div = document.createElement("div");
                    div.className = "prediction-item";
                    div.innerHTML = `
                        <div class="prediction-label">Classe ${i + 1}</div>
                        <div class="prediction-bar">
                            <div class="prediction-progress" style="width: 0%"></div>
                        </div>
                    `;
                    labelContainer.appendChild(div);
                }

                // Iniciar loop de predição
                loop();
            } catch (error) {
                console.error("Erro ao inicializar:", error);
                let mensagem = "Erro ao acessar a câmera";
                if (error.name === "NotAllowedError") {
                    mensagem = "Você negou acesso à câmera. Revogue a permissão e tente novamente.";
                } else if (error.name === "NotFoundError") {
                    mensagem = "Nenhuma câmera encontrada no seu dispositivo.";
                } else if (error.message) {
                    mensagem = "Erro: " + error.message;
                }
                alert(mensagem);
                document.getElementById("loading").classList.remove("active");
                stop();
            }
        }

        // Parar a webcam
        function stop() {
            isRunning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            if (webcam) {
                webcam.stop();
            }
            
            document.getElementById("startBtn").style.display = "inline-block";
            document.getElementById("stopBtn").style.display = "none";
            document.getElementById("webcam-container").classList.remove("active");
            document.getElementById("label-container").innerHTML = "";
        }

        // Loop contínuo de predição
        async function loop() {
            if (!isRunning) return;
            
            webcam.update();
            await predict();
            animationFrameId = window.requestAnimationFrame(loop);
        }

        // Executar predição
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const probability = (prediction[i].probability * 100).toFixed(1);
                const progressBar = labelContainer.childNodes[i].querySelector(".prediction-progress");
                const label = labelContainer.childNodes[i].querySelector(".prediction-label");
                
                label.textContent = `${prediction[i].className}: ${probability}%`;
                progressBar.style.width = `${probability}%`;
            }
        }
    </script>
