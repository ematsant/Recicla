<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador Teachable Machine</title>
    <style>
        /* CSS (Cascading Style Sheets) para melhorar o aspecto visual */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333333;
            font-size: 24px;
            margin-bottom: 20px;
            margin-top: 0;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            flex: 1;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #webcam-container {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            display: inline-block;
            border: 2px solid #dddddd;
            background-color: #eeeeee;
        }
        #webcam-container canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .label-row {
            display: flex;
            justify-content: space-between;
            background: #e9ecef;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-weight: bold;
            color: #495057;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Análise de Imagem</h1>
    <div class="controls">
        <button id="btn-start" type="button" onclick="init()">Iniciar Câmera</button>
        <button id="btn-switch" type="button" onclick="switchCamera()" disabled>Inverter Câmera</button>
    </div>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // URL (Uniform Resource Locator) com o diretório do modelo exportado
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;
    let isPlaying = false;
    
    // Configuração inicial para priorizar a câmera traseira em dispositivos móveis
    let currentFacingMode = "environment"; 

    async function init() {
        // Atualiza a UI (User Interface) durante o carregamento
        document.getElementById("btn-start").disabled = true;
        document.getElementById("btn-start").innerText = "Carregando...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        await setupWebcam();

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; 
        for (let i = 0; i < maxPredictions; i++) {
            let div = document.createElement("div");
            div.className = "label-row";
            labelContainer.appendChild(div);
        }

        // Habilita o botão de inversão de câmera e esconde o botão de iniciar
        document.getElementById("btn-switch").disabled = false;
        document.getElementById("btn-start").style.display = "none";
    }

    async function setupWebcam() {
        if (webcam) {
            webcam.stop(); // Encerra o feed atual da câmera ao alternar
        }

        // Se for a câmera traseira, não espelha a imagem (flip = false)
        const flip = currentFacingMode === "user"; 
        webcam = new tmImage.Webcam(250, 250, flip);

        // A API (Application Programming Interface) do Teachable Machine aceita as opções de facingMode
        await webcam.setup({ facingMode: currentFacingMode }); 
        await webcam.play();
        
        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = ""; 
        webcamContainer.appendChild(webcam.canvas);
        
        if (!isPlaying) {
            isPlaying = true;
            window.requestAnimationFrame(loop);
        }
    }

    async function switchCamera() {
        // Alterna a variável de controle entre câmera frontal (user) e traseira (environment)
        currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
        await setupWebcam();
    }

    async function loop() {
        if (isPlaying) {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            // Converte a probabilidade em porcentagem para facilitar a leitura
            const percent = (prediction[i].probability * 100).toFixed(0);
            const classPrediction = `${prediction[i].className}: ${percent}%`;
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }
    }
</script>

</body>
</html>
